<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Header -->
  <header class="bg-green-600 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">RicRice</h1>
      <nav class="space-x-4">
        <a href="index.html" class="hover:underline">Trang chủ</a>
        <button onclick="toggleCart()" class="bg-white text-green-600 font-semibold px-3 py-1 rounded hover:bg-gray-100">

<!-- Thông tin Gạo Japonica -->

        <h2 class="text-2xl font-semibold mb-4">Gạo Japonica</h2>

        <p class="text-gray-700 mb-4">Gạo Japonica là loại gạo hạt tròn, dẻo và thơm, được ưa chuộng trong các món ăn Nhật Bản như sushi và cơm nắm. Loại gạo này có độ dẻo cao, vị ngọt tự nhiên và rất dễ chế biến.</p>
        <p class="text-green-600 font-bold mb-4">40,000đ / kg</p>
        <button onclick="addToCart('Gạo Japonica', 40000)" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
            Thêm vào giỏ hàng
        </button>
    </div>
</section>
