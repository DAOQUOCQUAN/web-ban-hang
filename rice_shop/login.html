<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập - RicRice</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-green-400 to-blue-500 h-screen flex justify-center items-center">

  <!-- Container -->
  <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-lg">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-semibold text-green-600">RicRice</h1>
      <p class="text-lg text-gray-600 mt-2">Đăng nhập để tiếp tục</p>
    </header>

    <!-- Form Đăng nhập -->
    <form onsubmit="login(event)" class="space-y-4">
      <div>
        <label for="login-username" class="block text-gray-700 font-semibold">Tên người dùng</label>
        <input type="text" id="login-username" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-600 focus:outline-none" placeholder="Nhập tên người dùng">
      </div>
      <div>
        <label for="login-password" class="block text-gray-700 font-semibold">Mật khẩu</label>
        <input type="password" id="login-password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-600 focus:outline-none" placeholder="Nhập mật khẩu">
      </div>
      <button type="submit" class="w-full py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 focus:outline-none transition duration-300">Đăng nhập</button>
    </form>

    <div class="mt-4 text-center">
      <p class="text-gray-600">Chưa có tài khoản? <a href="register.html" class="text-blue-600 hover:text-blue-800">Đăng ký ngay</a></p>
    </div>
  </div>

  <script>
    // Phần Đăng nhập
    function login(event) {
      event.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();

      const users = JSON.parse(localStorage.getItem('users') || '{}');

      if (users[username] === password) {
        alert(`Chào mừng, ${username}! Bạn đã đăng nhập thành công.`);
        // Điều hướng đến trang chủ hoặc trang cần thiết
        window.location.href = "index.html"; // Thay bằng URL bạn muốn
      } else {
        alert("Tên đăng nhập hoặc mật khẩu sai!");
      }
    }
  </script>
</body>
</html>
