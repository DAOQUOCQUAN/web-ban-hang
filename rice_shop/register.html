<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký - RicRice</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-green-400 to-blue-500 h-screen flex justify-center items-center">

  <!-- Container -->
  <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-lg">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-semibold text-blue-600">RicRice</h1>
      <p class="text-lg text-gray-600 mt-2">Đăng ký tài khoản để tiếp tục</p>
    </header>

    <!-- Form Đăng ký -->
    <form onsubmit="register(event)" class="space-y-4">
      <div>
        <label for="register-username" class="block text-gray-700 font-semibold">Tên người dùng</label>
        <input type="text" id="register-username" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600 focus:outline-none" placeholder="Nhập tên người dùng">
      </div>
      <div>
        <label for="register-password" class="block text-gray-700 font-semibold">Mật khẩu</label>
        <input type="password" id="register-password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600 focus:outline-none" placeholder="Nhập mật khẩu">
      </div>
      <div>
        <label for="register-password-confirm" class="block text-gray-700 font-semibold">Xác nhận mật khẩu</label>
        <input type="password" id="register-password-confirm" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600 focus:outline-none" placeholder="Xác nhận mật khẩu">
      </div>
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:outline-none transition duration-300">Đăng ký</button>
    </form>

    <div class="mt-4 text-center">
      <p class="text-gray-600">Đã có tài khoản? <a href="login.html" class="text-green-600 hover:text-green-800">Đăng nhập ngay</a></p>
    </div>
  </div>

  <script>
    // Phần Đăng ký
    function register(event) {
      event.preventDefault();
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value.trim();
      const confirmPassword = document.getElementById('register-password-confirm').value.trim();

      if (!username || !password || !confirmPassword) {
        return alert("Vui lòng điền đầy đủ thông tin");
      }

      if (password !== confirmPassword) {
        return alert("Mật khẩu và xác nhận mật khẩu không khớp");
      }

      const users = JSON.parse(localStorage.getItem('users') || '{}');

      if (users[username]) {
        alert("Tài khoản đã tồn tại!");
        return;
      }

      users[username] = password;
      localStorage.setItem('users', JSON.stringify(users));
      alert("Đăng ký thành công! Bạn có thể đăng nhập.");
      window.location.href = "login.html"; // Điều hướng đến trang đăng nhập
    }
  </script>
</body>
</html>
