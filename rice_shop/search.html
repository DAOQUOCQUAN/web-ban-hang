<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tìm kiếm - RicRice</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-white p-6">

  <!-- Form tìm kiếm -->
  <div class="max-w-md w-full mx-auto bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-semibold text-gray-800 mb-4 text-center">Tìm kiếm sản phẩm</h2>

    <!-- Tìm kiếm -->
    <div class="flex space-x-4 items-center">
      <input type="text" id="search-input" class="p-2 border rounded-lg w-full" placeholder="Nhập tên sản phẩm...">
      <button onclick="searchProduct()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Tìm kiếm</button>
    </div>

    <div class="mt-4" id="search-result"></div>
  </div>

  <script>
    // Hàm tìm kiếm
    function searchProduct() {
      const query = document.getElementById('search-input').value.trim();
      const resultDiv = document.getElementById('search-result');
      
      if (query) {
        // Thực hiện tìm kiếm (ở đây dùng demo đơn giản)
        resultDiv.innerHTML = `<p class="text-lg text-green-600">Đang tìm kiếm sản phẩm: "${query}"...</p>`;
        // Bạn có thể kết nối API hoặc tìm kiếm từ danh sách sản phẩm tại đây
      } else {
        resultDiv.innerHTML = `<p class="text-lg text-red-600">Vui lòng nhập từ khóa tìm kiếm.</p>`;
      }
    }
  </script>

</body>
</html>
